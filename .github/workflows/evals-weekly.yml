name: Practice prompt evals (weekly)

# Runs the Tier 2 LLM eval suite once a week (Monday 09:00 IST = 03:30 UTC).
# Costs ~$0.06 per run with the configured model. Posts a Slack summary on
# failure; uploads the results JSON as a workflow artifact regardless.
#
# Manual trigger via the Actions tab → "Run workflow" (workflow_dispatch).

on:
  schedule:
    # Mon 03:30 UTC = Mon 09:00 IST
    - cron: "30 3 * * 1"
  workflow_dispatch:
    inputs:
      filter:
        description: "Optional fixture filter (subject key, fixture id, or id-prefix). Leave empty to run all."
        required: false
        default: ""

jobs:
  evals:
    runs-on: ubuntu-latest
    # Skip the entire job if the OPENAI key isn't configured. Avoids the
    # workflow appearing to fail loudly in forks / freshly-cloned repos.
    if: ${{ vars.ENABLE_PROMPT_EVALS == 'true' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Verify required secrets
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY secret is not set. Add it under repo Settings → Secrets."
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run practice prompt evals
        id: run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Use a stable, cheap model for weekly eval — overrideable via repo var.
          OPENAI_CHAT_MODEL: ${{ vars.OPENAI_EVAL_MODEL || 'gpt-4o-mini' }}
        run: |
          set -e
          mkdir -p evals/runs
          FILTER="${{ inputs.filter }}"
          if [ -n "$FILTER" ]; then
            pnpm exec tsx src/lib/practice/__evals__/cli.ts "$FILTER" --json
          else
            pnpm exec tsx src/lib/practice/__evals__/cli.ts --json
          fi
        # Don't fail the workflow on eval failure — we want the artifact + Slack
        # ping to fire either way. The slack step + the artifact step run
        # unconditionally; the final "fail-on-regression" step at the end
        # decides exit code.
        continue-on-error: true

      - name: Upload eval results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: evals/runs/*.json
          if-no-files-found: warn
          retention-days: 90

      - name: Post Slack summary
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PROMPT_EVALS_WEBHOOK_URL }}
          GITHUB_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: node scripts/post-eval-summary-to-slack.mjs

      - name: Fail workflow if any fixture regressed
        if: steps.run.outcome != 'success'
        run: |
          echo "Eval run reported regressions or errors — see artifact and Slack message."
          exit 1
