name: Unit tests

# Runs the full Vitest suite on every PR that touches code or test config.
# The admin-panel.yml workflow also runs the suite (plus integration steps
# when secrets are available); this lighter workflow is the gate for code
# changes that don't touch the admin panel and gives faster signal.

on:
  pull_request:
    paths:
      - "app/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest.config.*"
      - "tsconfig.json"
  push:
    branches: [main]

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup@v4 reads its version from package.json's
      # `packageManager` field — passing `version:` here conflicts with it
      # (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Vitest (full suite)
        run: pnpm vitest run
