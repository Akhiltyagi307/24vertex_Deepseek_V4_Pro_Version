name: Unit tests

# Runs the full Vitest suite on every PR that touches code or test config.
# The admin-panel.yml workflow also runs the suite (plus integration steps
# when secrets are available); this lighter workflow is the gate for code
# changes that don't touch the admin panel and gives faster signal.

on:
  pull_request:
    paths:
      - "app/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest.config.*"
      - "tsconfig.json"
  push:
    branches: [main]

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup@v4 reads its version from package.json's
      # `packageManager` field — passing `version:` here conflicts with it
      # (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Vitest (full suite)
        # `src/db/index.ts` throws at module load when DATABASE_URL is unset.
        # Several modules transitively import it, so vitest test-file
        # discovery itself fails without a value here. The dummy URL only
        # satisfies module-load; the `postgres` client is lazy and tests
        # that need a real connection are guarded by
        # `it.skipIf(!process.env.ADMIN_INTEGRATION_TESTS)` (see admin-panel
        # workflow for the integration step that provides the real secret).
        env:
          DATABASE_URL: postgres://ci-dummy:ci-dummy@127.0.0.1:5432/ci_test
        run: pnpm vitest run
